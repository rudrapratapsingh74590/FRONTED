<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display</title>
<style>
    *{
        margin:0px;
        padding:0px;
    }
    #box1{
        background-color: aquamarine;
        height: 50px;
        width:50px;
        margin:5px;
        text-align: center;
        display:block;
    }
    #box2{
        background-color: rgb(77, 16, 189);
        height: 50px;
        width:50px;
        margin:5px;
        text-align: center;
        
        display:block;

    }
    #box3{
        background-color: rgb(17, 196, 10);
        height: 50px;
        width:50px;
        margin:5px;
        text-align: center;
        display:inline;
    }
    #box4{
        background-color: rgb(150, 13, 20);
        height: 50px;
        width:50px;
        margin:5px;
        text-align: center;
        
        display:inline;

    }
    #box5{
        background-color: rgb(182, 238, 28);
        height: 50px;
        width:50px;
        margin:5px;
        text-align: center;
        display:inline-block;
    }
    #box6{
        background-color: rgb(218, 103, 9);
        height: 50px;
        width:50px;
        margin:5px;
        text-align: center;
        
        display:inline-block;

    }
</style>
</head>
<body>
    <div id="box1" class="box">box</div>
    <div id="box2" class="box">box</div>
    <div id="box3" class="box">box</div>
    <div id="box4" class="box">box</div>
    <div id="box5" class="box">box</div>
    <div id="box6" class="box">box</div>
</body>
</html>
