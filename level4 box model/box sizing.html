<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box model</title>
    <style>
        *{
            border:0px;
            margin:0px;
        }
        #first{
            height: 50px;
            width: 50px;
            background-color: aqua;
            padding:5px 6px 10px 18px;
            margin:4px 10px 20px 50px;
            border:5px dashed red;
            box-sizing: content-box;
        }
        #second{
            height: 50px;
            width: 50px;
            background-color: rgb(155, 111, 29);
            padding:5px 6px 10px 18px;
            margin:4px 10px 20px 50px;
            border:3px solid rgb(95, 192, 15);
            border-radius: 2%
            ;
            box-sizing: border-box;

        }
    </style>
</head>
<body>
    <p id="first">padded</p>
    <p id="second">rudra</p>
    
</body>
</html>
