<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text align</title>
    <style>
        .box{
            height:60px;
            width:100px;
        }
        #box1{
            color:aquamarine;
            background-color: blue;
            text-align:left
        }
        #box2{
            color:rgb(226, 36, 226);
            background-color: rgb(44, 44, 77);
            text-align: right;

        }
        #box3{
            color:rgb(214, 13, 124);
            background-color: rgb(29, 182, 67);
            text-align:center;
        }
        #box4{
            color:rgb(226, 36, 226);
            background-color: rgb(15, 106, 148);
            text-align: left;

        }
    </style>
</head>
<body>
    <h1 id="box1" class="box">Box1</h1>
    <h2 id="box2" class="box">Box2</h2>
    <h3 id="box3" class="box">Box3</h3>
    <h4 id="box4" class="box">Box4</h4>
</body>
</html>
