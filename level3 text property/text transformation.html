<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text transformation</title>
    <style>
        #text{
            text-transform:lowercase;
        }
        #rudra{
            text-transform:uppercase;
        }
        #hari{
            text-transform:capitalize;
        }
        #age{
            text-transform:none;
        }
    </style>
</head>
<body>
     <h3 id="text">THis is my text</h3>
    <h3 id="rudra">i am rudra pratap singh</h3>
    <h3 id="hari">i am  a betch student

    </h3>
    <h3 id="age">I amm seventheen year old</h3>
</body>
</html>
