<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vsibility</title>
    <style>
        #box1{
            color:aquamarine;
            background-color: red;
            height:50px;
            width:70px;
            visibility: hidden;

        }
        #box2{
             color:rgb(43, 11, 119);
            background-color: rgb(22, 179, 92);
            height:50px;
            width:80px;
            visibility:visible

        }
    </style>
</head>
<body>
    <div id="box1">box1 </div>
    <div id="box2">box2</div>
</body>
</html>
