<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font size</title>
    <style>
        #first{
            font-style: oblique;
        }
        #second{
            font-style: italic;
        }
         #third{
            font-style: unset;
        }
        #four{
            font-style: normal;
        }
        
        
    </style>
</head>
<body>
    
    <p id="first">hi</p>
    <p id="second">I am rudra pratap singh</p>
    <p id="third"> Good Morning</p>
    <p id="four">How are You</p>
</body>
</html>
