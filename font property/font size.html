<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font size</title>
    <style>
        #first{
            font-size: 10px;
            text-transform: uppercase;
            color:rgb(32, 202, 202)
        }
        #second{
            font-size: 25px;
        }
         #third{
            font-size: 30px;
        }
        #four{
            font-size: 50px;
        }
        #zero{
            font-size: 50px;
        }
        
    </style>
</head>
<body>
    <h1 id="zero">hello</h1>
    <p id="first">hi</p>
    <p id="second">I am rudra pratap singh</p>
    <p id="third"> Good Morning</p>
    <p id="four">How are You</p>
</body>
</html>
