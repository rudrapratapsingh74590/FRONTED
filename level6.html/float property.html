<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float property </title>
    <style>
        .container{
            border:10px solid black;
            border-radius: 10px;
            height:200px;
            width: 500px;
            margin:10px;

        }
        .box1{
            background-color:rgb(185, 15, 15);
            height:50px;
            width:100px;
            margin:20px;
            border:5px dotted black;
            float:right;
        
        }
        .box2{
            background-color: blue;
            height:50px;
            width:100px;
        margin:20px;
        border:5px solid rgb(13, 84, 238);
        border-radius: 5px ;
        float:left;

            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
