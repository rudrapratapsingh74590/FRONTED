<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box justify content</title>
    <style>
    *{
            margin:0px;
            padding:0px;
        }
        h1{
         text-align:center;
        }
        .container{
            height: 400px;
            width:500px;
            border:3px solid black;
            margin:10px;
            display:flex;
            justify-content:space-around;
    
        }
        
        .box{
            height:80px;
            width:100px;
            margin:3px;

        }
        #box1{background-color: blueviolet;}
        #box2{background-color: brown;}
        #box3{background-color: aqua;}
        #box4{background-color: blanchedalmond;}
    </style>

</head>
<body>
    <div class="container ">
        <div id="box1" class="box">BOX1</div>
        <div id="box2" class="box">BOX2</div>
        <div id="box3" class="box">BOX3</div>
        <div id="box4" class="box">BOX4</div><br>
        
</body>
</html>
<!--TYPES OF FLEXBOX CONTAINER(JUSTIFY CONTENT) 
1)FLEX START-items start to the start ofthe flex container
2)FLEX END-items align to the end of flexbox container 
3)CENTER- items align to the  center of the flexbox
4)SPACE BETWEEN
5)SPACE AROUND
6)SPACE EVENLY-->
