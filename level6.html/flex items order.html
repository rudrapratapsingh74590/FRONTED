<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        h1{
         text-align:center;
        }
        .container{
            height: 400px;
            width:500px;
            border:3px solid black;
            margin:10px;
            display:flex;
            flex-direction:row;
        }
        
        .box{
            height:80px;
            width:100px;
            margin:3px;

        }
        #box1{background-color: blueviolet; 
        order:3}
        #box2{background-color: brown;
        order:4}
        #box3{background-color: aqua; order:1}
        #box4{background-color: blanchedalmond; order:2}
    </style>
</head>
<body>
    <h1>Flex Container</h1>
    <div class="container ">
        <div id="box1" class="box">BOX1</div>
        <div id="box2" class="box">BOX2</div>
        <div id="box3" class="box">BOX3</div>
        <div id="box4" class="box">BOX4</div>
    </div>
</body>
</html>
