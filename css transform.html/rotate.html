<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rotate</title>
    <style>
        .box{
            text-align: center;
            height:60px;
            width:60px;
            border:2px solid black;
            background-color:blue;
            position:relative;
            top:100px;left:100px;
            transition:all 2s ease-in;
            border-radius: 10px;
        }
        .box:hover{
            transform:rotatey(270deg);
            background-color: brown;
        }
        /*rotation can be done about x y and z axis and it can be writen as rotatex ,rotatey,rotatez respectively*/
    </style>
</head>
<body>
    <div class="box">rotate</div>
</body>
</html>
