<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition</title>
    <style>

        .btn{
            height:50px;
            width: 100px;
            background-color: aqua;
            border:2px solid black;
            border-radius:10px;
            transition-property:all;
            transition-duration: 4s;
            transition-delay: 1s;

        }
        .btn:hover{
            height:80px;
            width:150px;
            background-color:rgb(10, 196, 125);
        }
        .btn:active{
             height:80px;
            width:150px;
            background-color:rgb(231, 11, 132);
        }
        
    </style>
</head>
<body>
     <button class="btn">Click Me</button>
</body>
</html>
